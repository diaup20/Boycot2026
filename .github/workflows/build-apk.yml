name: Build APK (debug)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Set ANDROID_SDK_ROOT
        run: echo "ANDROID_SDK_ROOT=$HOME/Android/Sdk" >> $GITHUB_ENV

      - name: Install Android SDK command-line tools and accept licenses
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y wget unzip libglu1-mesa

          # Create SDK root
          mkdir -p "$ANDROID_HOME"

          # Download command-line tools
          cd /tmp
          wget -O cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip"
          unzip -q cmdline-tools.zip

          # Place command-line tools into cmdline-tools/latest as required by sdkmanager
          mkdir -p "$ANDROID_HOME/cmdline-tools/latest"
          mv cmdline-tools/* "$ANDROID_HOME/cmdline-tools/latest/"

          # Ensure binaries are executable
          chmod -R a+rx "$ANDROID_HOME"

          # Use full path to sdkmanager to avoid quoting/assignment issues
          SDKMANAGER_PATH="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          # Accept licenses
          yes | "$SDKMANAGER_PATH" --sdk_root="$ANDROID_HOME" --licenses
          # Install required packages
          "$SDKMANAGER_PATH" --sdk_root="$ANDROID_HOME" "platform-tools" "platforms;android-31" "build-tools;31.0.0"

          # Export PATH for following steps
          echo "PATH=$ANDROID_HOME/platform-tools:$ANDROID_HOME/cmdline-tools/latest/bin:$PATH" >> $GITHUB_ENV

      - name: Debug: list repo root (for diagnostics)
        run: |
          echo "Repo root listing:"
          ls -la
          echo "Find top-level files/directories:"
          find . -maxdepth 2 -type d -print

      - name: Create Android platform (if missing)
        run: |
          if [ ! -d "android" ] || [ ! -f "android/app/build.gradle" ]; then
            echo "android/ or android/app/build.gradle missing — creating Android platform via flutter create --platforms=android ."
            flutter create --platforms=android .
          else
            echo "android/ detected — skipping flutter create"
          fi

      - name: Verify android folder
        run: |
          if [ ! -f "android/app/build.gradle" ]; then
            echo "::error::android/app/build.gradle not found — CI cannot proceed"
            ls -la android || true
            exit 1
          else
            echo "android/app/build.gradle exists, continuing..."
          fi

      - name: Flutter pub get
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
