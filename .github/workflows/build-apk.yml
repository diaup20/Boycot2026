name: Build APK (debug)

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Set ANDROID_SDK_ROOT
        run: echo "ANDROID_SDK_ROOT=$HOME/Android/Sdk" >> $GITHUB_ENV

      - name: Install Android SDK command-line tools and accept licenses
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip libglu1-mesa

          # Create SDK root
          mkdir -p "$ANDROID_HOME"

          # Download command-line tools (update the version if needed)
          cd /tmp
          wget -O cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-8512546_latest.zip"
          unzip -q cmdline-tools.zip

          # Place command-line tools into cmdline-tools/latest as required by sdkmanager
          mkdir -p "$ANDROID_HOME/cmdline-tools/latest"
          mv cmdline-tools/* "$ANDROID_HOME/cmdline-tools/latest/"

          # Ensure binaries are executable
          chmod -R a+rx "$ANDROID_HOME"

          # Use sdkmanager with explicit --sdk_root to avoid lookup issues
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME"

          # Accept licenses and install required packages
          yes | $SDKMANAGER --licenses
          $SDKMANAGER "platform-tools" "platforms;android-31" "build-tools;31.0.0"

          # Make platform-tools and tools available to PATH for subsequent steps in this run
          echo "PATH=$ANDROID_HOME/platform-tools:$ANDROID_HOME/cmdline-tools/latest/bin:$PATH" >> $GITHUB_ENV

      - name: Flutter pub get
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
